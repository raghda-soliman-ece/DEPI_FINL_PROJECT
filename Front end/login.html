<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | جوميا مصر</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 25px; }
        .auth-tab { flex: 1; text-align: center; padding: 12px; font-weight: 700; font-size: 15px; cursor: pointer; transition: var(--transition); color: var(--muted); }
        .auth-tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); margin-bottom: -2px; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .otp-hint { background: #fff8f0; border: 1px solid #ffe0b2; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #666; margin-bottom: 18px; line-height: 1.6; }
        .otp-hint strong { color: var(--primary); }
        #otp-input { letter-spacing: 8px; text-align: center; font-size: 22px; font-weight: 800; }
        .auth-msg {
            display: none;
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            font-weight: 600;
        }
        .auth-msg.show { display: block; }
        .auth-msg.info { background: #eef6ff; color: #155a9c; border: 1px solid #c8e0f8; }
        .auth-msg.success { background: #eef9f0; color: #1b7a32; border: 1px solid #b9e5c2; }
        .auth-msg.error { background: #fdeeee; color: #b42318; border: 1px solid #f3c1bd; }
        .auth-msg.warn { background: #fff8e8; color: #8a5a00; border: 1px solid #f0d49a; }
    </style>
</head>
<body>
<header class="main-header"><div class="container header-inner" style="justify-content:center;"><div class="logo"><a href="index.html"><span class="logo-text">jumia</span></a></div></div></header>

<div class="auth-page">
    <div class="auth-wrapper" style="max-width:480px;">
        <div class="auth-header">
            <h2>أهلاً بك في جوميا</h2>
            <p>سجّل دخولك أو أنشئ حساباً جديداً</p>
        </div>

        <div id="auth-msg" class="auth-msg" role="status" aria-live="polite"></div>

        <div class="auth-tabs" id="auth-tabs">
            <div class="auth-tab active" onclick="switchAuthTab('login', this)">تسجيل الدخول</div>
            <div class="auth-tab" onclick="switchAuthTab('register', this)">إنشاء حساب جديد</div>
        </div>

        <div class="tab-panel active" id="panel-login">
            <form id="login-form">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="login-email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-orange" id="login-btn" style="width:100%;justify-content:center;padding:14px;font-size:16px;">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>
            </form>
        </div>

        <div class="tab-panel" id="panel-register">
            <form id="register-form">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div class="form-group"><label>الاسم الأول</label><input type="text" id="reg-fname" placeholder="محمد" required></div>
                    <div class="form-group"><label>الاسم الأخير</label><input type="text" id="reg-lname" placeholder="أحمد" required></div>
                </div>
                <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="reg-email" placeholder="example@email.com" required></div>
                <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="reg-phone" placeholder="01xxxxxxxxx"></div>
                <div class="form-group"><label>كلمة المرور</label><input type="password" id="reg-password" placeholder="6 characters minimum" required minlength="6"></div>
                <button type="submit" class="btn btn-orange" id="reg-btn" style="width:100%;justify-content:center;padding:14px;font-size:16px;">
                    <i class="fas fa-user-plus"></i> إنشاء الحساب
                </button>
            </form>
        </div>

        <div class="tab-panel" id="panel-otp">
            <div class="otp-hint">
                <i class="fas fa-envelope-open-text" style="color:var(--primary);"></i>
                Enter the 6-digit code sent to: <strong id="otp-email-label"></strong><br>
                Check Inbox and Spam. If nothing arrives, ask the backend team to fix email SMTP.
            </div>
            <form id="otp-form">
                <div class="form-group">
                    <label>Verification code</label>
                    <input type="text" id="otp-input" inputmode="numeric" maxlength="6" placeholder="••••••" required autocomplete="one-time-code">
                </div>
                <button type="submit" class="btn btn-orange" id="otp-btn" style="width:100%;justify-content:center;padding:14px;font-size:16px;">
                    <i class="fas fa-check-circle"></i> Confirm code
                </button>
            </form>
            <div style="display:flex;justify-content:space-between;margin-top:16px;font-size:13px;">
                <a href="#" id="resend-otp-link" style="color:var(--primary);font-weight:700;">Resend code</a>
                <a href="#" id="back-auth-link" style="color:var(--muted);">Back</a>
            </div>
        </div>

        <div class="auth-links" style="margin-top:20px;">
            <a href="index.html"><i class="fas fa-arrow-right"></i> Continue shopping without login</a>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script>
let pendingEmail = '';
let pendingDisplayName = '';
let msgTimer = null;

function showMsg(text, type = 'info') {
    const el = document.getElementById('auth-msg');
    el.className = 'auth-msg show ' + type;
    el.textContent = text;
    clearTimeout(msgTimer);
    if (type === 'success' || type === 'info') {
        msgTimer = setTimeout(() => { el.classList.remove('show'); }, 8000);
    }
}

function clearMsg() {
    const el = document.getElementById('auth-msg');
    el.classList.remove('show');
    el.textContent = '';
}

function switchAuthTab(tab, el) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    if (el) el.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
    document.getElementById('auth-tabs').style.display = (tab === 'otp') ? 'none' : 'flex';
}

function showOtpStep(email, displayName, note) {
    pendingEmail = email;
    pendingDisplayName = displayName || email.split('@')[0];
    document.getElementById('otp-email-label').textContent = email;
    document.getElementById('otp-input').value = '';
    switchAuthTab('otp', null);
    showMsg(note || 'Account created. Enter the verification code from your email.', 'info');
    document.getElementById('otp-input').focus();
}

function saveUserAndGo(data, fallbackEmail, fallbackName) {
    const displayName = data.displayName || data.DisplayName || fallbackName || (fallbackEmail || '').split('@')[0];
    const token = data.token || data.Token;
    if (!token) throw new Error('Server did not return an auth token.');
    const userData = {
        firstName: String(displayName).split(' ')[0],
        lastName: String(displayName).split(' ').slice(1).join(' '),
        email: data.email || data.Email || fallbackEmail,
        token
    };
    localStorage.setItem('jumia-user', JSON.stringify(userData));
    window.location.href = 'index.html';
}

function networkFriendlyError(error, fallback) {
    const msg = (error && error.message) || '';
    if (/failed to fetch|networkerror|load failed/i.test(msg)) {
        return 'Cannot reach the API. Try mobile hotspot or VPN, then try again.';
    }
    return msg || fallback;
}

async function parseError(res, fallback) {
    let errorMsg = fallback;
    try {
        const errData = await res.json();
        if (errData.errors && Array.isArray(errData.errors)) errorMsg = errData.errors.join('\n');
        else if (errData.Errors && Array.isArray(errData.Errors)) errorMsg = errData.Errors.join('\n');
        else if (errData.message || errData.Message) errorMsg = errData.message || errData.Message;
        else if (errData.errors && typeof errData.errors === 'object') errorMsg = Object.values(errData.errors).flat().join('\n');
    } catch (e) {}
    return errorMsg;
}

document.getElementById('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    clearMsg();
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('login-btn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking...';
    btn.disabled = true;

    try {
        const res = await fetch(`${API_BASE_URL}/Auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        if (!res.ok) throw new Error(await parseError(res, 'Invalid email or password'));

        const data = await res.json();
        if (data.requiresTwoFactor || data.RequiresTwoFactor) {
            const code = data.verificationCode || data.VerificationCode;
            const note = code
                ? `Verification code (email unavailable): ${code}`
                : (data.message || 'Verification code requested. Check your email (and Spam).');
            showOtpStep(data.email || data.Email || email, data.displayName || data.DisplayName, note);
            if (code) document.getElementById('otp-input').value = code;
            return;
        }
        saveUserAndGo(data, email);
    } catch (error) {
        showMsg(networkFriendlyError(error, 'Login failed'), 'error');
    } finally {
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
        btn.disabled = false;
    }
});

document.getElementById('register-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    clearMsg();
    const fname = document.getElementById('reg-fname').value.trim();
    const lname = document.getElementById('reg-lname').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const btn = document.getElementById('reg-btn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
    btn.disabled = true;

    try {
        const res = await fetch(`${API_BASE_URL}/Auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ displayName: fname + ' ' + lname, email, password })
        });

        if (!res.ok) throw new Error(await parseError(res, 'Could not create account. Email may already be used.'));

        const data = await res.json();
        if (data.requiresTwoFactor || data.RequiresTwoFactor || !(data.token || data.Token)) {
            const code = data.verificationCode || data.VerificationCode;
            const note = code
                ? `Account created. Email SMTP is off — your code is: ${code}`
                : 'Account created. If no email arrives, this is a backend SMTP issue.';
            showOtpStep(
                data.email || data.Email || email,
                data.displayName || data.DisplayName || (fname + ' ' + lname),
                note
            );
            if (code) document.getElementById('otp-input').value = code;
            return;
        }
        saveUserAndGo(data, email, fname);
    } catch (error) {
        showMsg(networkFriendlyError(error, 'Registration failed'), 'error');
    } finally {
        btn.innerHTML = '<i class="fas fa-user-plus"></i> إنشاء الحساب';
        btn.disabled = false;
    }
});

document.getElementById('otp-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    clearMsg();
    const code = document.getElementById('otp-input').value.trim();
    if (!/^\d{6}$/.test(code)) {
        showMsg('Code must be exactly 6 digits.', 'error');
        return;
    }
    const btn = document.getElementById('otp-btn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Confirming...';
    btn.disabled = true;

    try {
        const res = await fetch(`${API_BASE_URL}/Auth/verify-2fa`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: pendingEmail, code })
        });
        if (!res.ok) throw new Error(await parseError(res, 'Invalid or expired code. Use Resend code.'));
        const data = await res.json();
        saveUserAndGo(data, pendingEmail, pendingDisplayName);
    } catch (error) {
        showMsg(networkFriendlyError(error, 'Verification failed'), 'error');
    } finally {
        btn.innerHTML = '<i class="fas fa-check-circle"></i> Confirm code';
        btn.disabled = false;
    }
});

document.getElementById('resend-otp-link').addEventListener('click', async function (e) {
    e.preventDefault();
    if (!pendingEmail) return;
    showMsg('Sending a new code...', 'info');
    try {
        const res = await fetch(`${API_BASE_URL}/Auth/resend-2fa`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: pendingEmail })
        });
        if (!res.ok) throw new Error(await parseError(res, 'Could not resend code'));
        const data = await res.json().catch(() => ({}));
        const code = data.verificationCode || data.VerificationCode;
        if (code) {
            showMsg(`New code (email unavailable): ${code}`, 'warn');
            document.getElementById('otp-input').value = code;
        } else {
            showMsg(data.message || data.Message || 'New code requested. Check Inbox/Spam.', 'warn');
        }
    } catch (error) {
        showMsg(networkFriendlyError(error, 'Could not resend code'), 'error');
    }
});

document.getElementById('back-auth-link').addEventListener('click', function (e) {
    e.preventDefault();
    clearMsg();
    switchAuthTab('login', document.querySelector('.auth-tab'));
});

document.getElementById('otp-input').addEventListener('input', function () {
    this.value = this.value.replace(/\D/g, '').slice(0, 6);
});
</script>
</body>
</html>
