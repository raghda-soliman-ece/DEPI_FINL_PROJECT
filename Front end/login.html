<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | جوميا مصر</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 25px; }
        .auth-tab { flex: 1; text-align: center; padding: 12px; font-weight: 700; font-size: 15px; cursor: pointer; transition: var(--transition); color: var(--muted); }
        .auth-tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); margin-bottom: -2px; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
    </style>
</head>
<body>
<header class="main-header"><div class="container header-inner" style="justify-content:center;"><div class="logo"><a href="index.html"><span class="logo-text">jumia</span></a></div></div></header>

<div class="auth-page">
    <div class="auth-wrapper" style="max-width:480px;">
        <div class="auth-header">
            <h2>أهلاً بيك في جوميا 👋</h2>
            <p>سجل دخولك أو أنشئ حساباً جديداً</p>
        </div>

        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchAuthTab('login', this)">تسجيل الدخول</div>
            <div class="auth-tab" onclick="switchAuthTab('register', this)">إنشاء حساب جديد</div>
        </div>

        <!-- Login Form -->
        <div class="tab-panel active" id="panel-login">
            <form id="login-form">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="login-email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <div style="text-align:left;margin-bottom:15px;"><a href="#" style="font-size:13px;color:var(--muted);">نسيت كلمة المرور؟</a></div>
                <button type="submit" class="btn btn-orange" id="login-btn" style="width:100%;justify-content:center;padding:14px;font-size:16px;">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>
            </form>
        </div>

        <!-- Register Form -->
        <div class="tab-panel" id="panel-register">
            <form id="register-form">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div class="form-group"><label>الاسم الأول</label><input type="text" id="reg-fname" placeholder="محمد" required></div>
                    <div class="form-group"><label>الاسم الأخير</label><input type="text" id="reg-lname" placeholder="أحمد" required></div>
                </div>
                <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="reg-email" placeholder="example@email.com" required></div>
                <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="reg-phone" placeholder="01xxxxxxxxx"></div>
                <div class="form-group"><label>كلمة المرور</label><input type="password" id="reg-password" placeholder="8 حروف على الأقل" required></div>
                <button type="submit" class="btn btn-orange" id="reg-btn" style="width:100%;justify-content:center;padding:14px;font-size:16px;">
                    <i class="fas fa-user-plus"></i> إنشاء الحساب
                </button>
            </form>
        </div>

        <div class="auth-links" style="margin-top:20px;">
            <a href="index.html"><i class="fas fa-arrow-right"></i> العودة للتسوق بدون تسجيل</a>
        </div>
    </div>
</div>

<script>
function switchAuthTab(tab, el) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
}

// Login
document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('login-email').value;
    const btn = document.getElementById('login-btn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';
    btn.disabled = true;

    setTimeout(() => {
        // Extract first name from email
        const namePart = email.split('@')[0];
        const firstName = namePart.charAt(0).toUpperCase() + namePart.slice(1);
        const userData = { firstName, lastName: '', email, phone: '' };
        localStorage.setItem('jumia-user', JSON.stringify(userData));
        window.location.href = 'index.html';
    }, 1200);
});

// Register
document.getElementById('register-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري إنشاء الحساب...';
    btn.disabled = true;

    setTimeout(() => {
        const userData = {
            firstName: document.getElementById('reg-fname').value,
            lastName: document.getElementById('reg-lname').value,
            email: document.getElementById('reg-email').value,
            phone: document.getElementById('reg-phone').value,
        };
        localStorage.setItem('jumia-user', JSON.stringify(userData));
        window.location.href = 'index.html';
    }, 1500);
});
</script>
</body></html>
